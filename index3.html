<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Undangan Spesial 💌</title>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>selamat untuk yang <br>mendapatkannya</h2>
  <input type="password" id="password" placeholder="Password..."><br>
  <button onclick="login()">Buka</button>
</div>

<!-- CARD -->
<div class="card-container" id="cardBox">
  <div class="card" id="card" onclick="flipCard()">

    <div class="card-face front">
       Klik untuk membuka
    </div>

    <div class="card-face back">
      <div>
        Kadang hidup terasa berat dan tidak sesuai harapan. Tapi itu bukan berarti kamu gagal—itu tanda kamu sedang berproses.

Pelan saja, tidak perlu sempurna <br>
Yang penting, kamu tetap berjalan <br>

Selama kamu belum menyerah, <br>
harapan itu masih ada. ❤️😊
      </div>
    </div>

  </div>
</div>

<!-- MUSIC -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script src="script1.js"></script>
</body>
</html>
